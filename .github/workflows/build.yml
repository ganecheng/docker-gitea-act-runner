name: Build

on:
  workflow_dispatch:
    inputs:
      VERSION:
        type: string
        default: latest
        description: Version of the Gitea Actions Runner, see https://dl.gitea.com/act_runner/


defaults:
  run:
    shell: bash


env:
  DOCKER_REPO_NAME: gitea-act-runner
  HUAWEICLOUD_IAM_AK: "${{ secrets.HUAWEICLOUD_IAM_AK }}"
  HUAWEICLOUD_IAM_SK: "${{ secrets.HUAWEICLOUD_IAM_SK }}"


permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      packages: write

    env:
      TZ: Asia/Shanghai
      GITEA_RUNNER_VERSION: latest

    steps:
    - name: Git Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0


    - name: Login to ghcr.io
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    # - name: Login to SWR
    #   run: docker login -u cn-southwest-2@$HUAWEICLOUD_IAM_AK -p $HUAWEICLOUD_IAM_SK swr.cn-southwest-2.myhuaweicloud.com


    - name: Build and Push
      env:
        DOCKER_BASE_IMAGE: ubuntu:24.04
        DOCKER_IMAGE_REPO: ${{ github.repository_owner }}/${{ env.DOCKER_REPO_NAME }}
        DOCKER_PUSH_GHCR: "true"
        # DOCKER_PUSH_SWR: "true"
        # DOCKER_SWR_REGISTRY: swr.cn-southwest-2.myhuaweicloud.com
        # DOCKER_SWR_NAMESPACE: gsc-hub
      run: |
        set -eu
        if [[ -n "${{ inputs.VERSION }}" ]]; then
          export GITEA_RUNNER_VERSION="${{ inputs.VERSION }}"
        fi
        export IMAGE_TAG="$(date +'%Y%m%d_%H%M%S')-x86_64"
        echo "IMAGE_TAG=$IMAGE_TAG"
        bash build-image.sh
